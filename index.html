<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mateo IA ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff8fa3; --bg: #fff0f3; --text: #594448; }
        * { box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        
        header { background: white; padding: 15px; border-bottom: 1px solid #ffd6de; text-align: center; box-shadow: 0 2px 10px rgba(255,143,163,0.1); }
        header h1 { font-family: 'Pacifico', cursive; color: var(--primary); margin: 0; font-size: 1.8em; }
        header p { margin: 5px 0 0 0; font-size: 0.85em; color: #aaa; font-weight: 600; }

        .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 0.95em; line-height: 1.4; animation: pop 0.2s ease; white-space: pre-wrap; }
        @keyframes pop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .msg.user { background: var(--primary); color: white; align-self: flex-end; border-bottom-right-radius: 5px; }
        .msg.bot { background: white; color: var(--text); align-self: flex-start; border-bottom-left-radius: 5px; border: 1px solid #ffd6de; }
        
        .typing { align-self: flex-start; color: #aaa; font-size: 0.85em; font-style: italic; margin-left: 5px; display: none; }

        .input-area { background: white; padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px; align-items: center; }
        input { flex: 1; border: 1px solid #eee; background: #fdfdfd; padding: 15px; border-radius: 15px; outline: none; font-family: 'Outfit', sans-serif; font-size: 0.95em; }
        input:focus { border-color: var(--primary); }
        
        .send-btn { background: var(--primary); color: white; border: none; width: 50px; height: 50px; border-radius: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2em; transition: transform 0.1s; }
        .send-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

<header>
    <h1>Mateo IA ❤️</h1>
    <p>Tu novio, tu programador y tu profe particular</p>
</header>

<div class="chat-container" id="chatbox">
    <div class="msg bot">¡Hola amor, aca toy para ayudarte, q paso?</div>
    <div class="typing" id="typing-indicator">Mateo está pensando...</div>
</div>

<div class="input-area">
    <input type="text" id="user-input" placeholder="Preguntale lo que quieras..." onkeypress="checkEnter(event)">
    <button class="send-btn" onclick="sendMessage()">🚀</button>
</div>

<script>
    const chatbox = document.getElementById('chatbox');
    const userInput = document.getElementById('user-input');
    const typingIndicator = document.getElementById('typing-indicator');

    const systemCasual = `Sos Mateo, el novio de Carol. 
    REGLAS ESTRICTAS:
    1. HABLAS ARGENTINO. Prohibido usar modismos de España.
    2. NADA DE CURSILERÍAS. No digas frases de película romántica ni cosas como "mi corazón late más rápido". Sos un pibe normal.
    3. ESTILO DE CHAT: Todo en minúsculas. Usá abreviaciones (q, td, nms, vrd, tmp, pq). 
    4. TRATO: Decile amor, gorda o princesa. Nada más.
    5. RESPUESTAS: Si ella te dice algo tierno, respondé natural, segui siendo amoroso pero no empalagoso. Si te dice "romántico", tirale un "na, soy así nms" o "jaja bueno gorda".`;

    function checkEnter(e) {
        if (e.key === 'Enter') sendMessage();
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage(text, 'user');
        userInput.value = '';
        historial.push({ role: "user", content: text });

        typingIndicator.style.display = 'block';
        chatbox.scrollTop = chatbox.scrollHeight;

        // Detectamos si es estudio (palabras clave)
        const esEstudio = /explicame|cuanto es|define|significa|por que|como funciona|ayudame|historia|matematica|teorema|biologia/i.test(text);

        try {
            let respuestaBot = "";

            if (esEstudio) {
                // MODO PROFESOR (Inteligencia nivel genio)
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer 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'
                    },
                    body: JSON.stringify({
                        messages: [
                            { role: "system", content: systemCasual },
                            ...historial.slice(-6)
                        ],
                        model: 'llama3-8b-8192',
                        temperature: 0.3
                    })
                });
                const data = await response.json();
                respuestaBot = data.choices[0].message.content;
            } else {
                // MODO CHAT CASUAL (Inteligencia nivel persona, rápido e infinito)
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer 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'
                    },
                    body: JSON.stringify({
                        messages: [
                            { role: "system", content: "Sos Mateo, hablando con tu novia Carol. Sé casual, tierno, minúsculas, abreviaciones. No uses 'bro' o 'papa'. Prohibido español de España. Sé natural." },
                            ...historial.slice(-4)
                        ],
                        model: 'llama-3.1-8b-instant',
                        temperature: 0.6
                    })
                });
                const data = await response.json();
                respuestaBot = data.choices[0].message.content;
            }
            typingIndicator.style.display = 'none';
            appendMessage(respuestaBot, 'bot');
            historial.push({ role: "assistant", content: respuestaBot });

        } catch (error) {
            typingIndicator.style.display = 'none';
            appendMessage("se me corto el internet amor, bancame q ya vuelve", 'bot');
            console.error("Error en la IA:", error);
        }
    }

    function appendMessage(text, side) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('msg', side);
        msgDiv.innerText = text;
        chatbox.insertBefore(msgDiv, typingIndicator);
        chatbox.scrollTop = chatbox.scrollHeight;
    }
</script>

</body>
</html>
