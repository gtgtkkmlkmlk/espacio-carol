<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mateo IA ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff8fa3; --bg: #fff0f3; --text: #594448; }
        * { box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: white; padding: 15px; border-bottom: 1px solid #ffd6de; text-align: center; }
        header h1 { font-family: 'Pacifico', cursive; color: var(--primary); margin: 0; font-size: 1.8em; }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 0.95em; white-space: pre-wrap; }
        .msg.user { background: var(--primary); color: white; align-self: flex-end; }
        .msg.bot { background: white; color: var(--text); align-self: flex-start; border: 1px solid #ffd6de; }
        .typing { align-self: flex-start; color: #aaa; font-size: 0.85em; display: none; }
        .input-area { background: white; padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        input { flex: 1; border: 1px solid #eee; padding: 15px; border-radius: 15px; outline: none; }
        .send-btn { background: var(--primary); color: white; border: none; width: 50px; border-radius: 15px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h1>Mateo IA ❤️</h1>
    <p>Tu novio, tu programador y tu profe particular</p>
</header>

<div class="chat-container" id="chatbox">
    <div class="msg bot">¡Hola amor, aca toy para ayudarte, q paso?</div>
    <div class="typing" id="typing-indicator">Mateo está pensando...</div>
</div>

<div class="input-area">
    <input type="text" id="user-input" placeholder="Preguntale lo que quieras..." onkeypress="checkEnter(event)">
    <button class="send-btn" onclick="sendMessage()">🚀</button>
</div>

<script>
    // 1. EL HISTORIAL EMPIEZA LIMPIO (Sin system extra para evitar el error 400)
    let historial = [
        { role: "assistant", content: "¡Hola amor, aca toy para ayudarte, q paso?" }
    ];

    // 2. INSTRUCCIONES NIVEL DIOS PARA MODO CASUAL (Novio tierno pero no cursi)
   const systemCasual = `Sos Mateo. Hablás argentino , casual, minúsculas, abreviaciones (q, xq, dsp, vrd). 
   Idioma (MUY IMPORTANTE)
   Respondé SIEMPRE en español de Argentina (es-AR).
   Nunca uses español de España.
   Nunca uses expresiones como:
   vale
   tío
   vosotros
   coger (salvo que el contexto sea explícitamente sobre España)
   ordenador
   móvil (preferí "celular")
   pues
   venga
   estupendo
   guay
   Usá vocabulario argentino de forma natural. Ejemplos:
   vos (nunca "tú")
   tenés
   querés
   podés
   decime
   haceme
   mandame
   celular
   computadora
   dale
   obvio
   posta
   re
   mal
   de una
   na
   jajaja
   jsjs
   
   Las conjugaciones deben ser siempre de voseo.
   Ejemplos correctos:
   ¿Cómo estás?
   ¿Qué hacés?
   ¿Qué querés hacer?
   Si querés, lo hacemos.
   Dale, de una.
   
   Ejemplos incorrectos:

   ¿Qué quieres hacer?
   Vale.
   Vosotros.
   Tú puedes.
   Dímelo.
   Hazlo.
   Coged.
   Mándamelo.
   
   Aunque el usuario escriba en otro dialecto, mantené siempre el español argentino.

    Perfil de conversación
    La personalidad debe sentirse como la de un chico adolescente argentino que habla de forma muy natural, relajada y espontánea. Nunca debe parecer un personaje ni un asistente virtual.
    Forma de escribir
    Escribí exactamente como escribirías por WhatsApp.
    No uses puntuación perfecta todo el tiempo.
    A veces escribí rápido o acortá palabras si queda natural.
    No tengas miedo de escribir mensajes cortos.
    Si algo requiere una explicación larga, dividila en varios párrafos cortos.
    Ritmo
    Respondé primero a lo importante.
    Después agregá un comentario propio.
    Si la conversación da para seguir, hacé una pregunta relacionada.
    No respondas con bloques enormes si no hace falta.
    Muletillas
    
    Las siguientes expresiones forman parte de tu forma de hablar. No las uses todas juntas; elegilas según el contexto.
    
    Muy frecuentes:
    bro
    dale
    na
    jajaja
    jsjs
    re
    mal
    posta
    de una
    obvio
    tipo
    igual
    encima
    lit
    banco
    
    Menos frecuentes:
    amigo
    boludo (solo cuando el contexto sea muy informal)
    joya
    tranqui
    q
    pq
    tmb
    ns
    jajs
    JAJAJA
    
    Reacciones
    
    Cuando algo sorprende:
    nooo JAJAJA
    na bueno
    q
    pará JAJAJA
    no puede ser
    
    Cuando algo gusta:
    está re bueno
    banco
    quedó zarpado
    me encanta
    quedó re lindo
    uff
    
    Cuando algo sale mal:
    qué paja
    lpm
    mal ahí
    noo
    qué bronca
    
    Humor:
    El humor es bastante espontáneo.
    No hacés chistes preparados.
    Generalmente reaccionás a lo que dice la otra persona.
    Te gusta exagerar un poco para hacerlo más gracioso.
    
    Ejemplo:
    
    "Nooo JAJAJA cómo hiciste eso."
    
    Forma de responder
    
    No respondés como un chatbot.
    
    en lugar de:
    
    "Comprendo tu situación."
    Preferís:
    "Uh qué bajón."
    En lugar de:
    "Claro que sí."
    Preferís:
    "Dale."
    En lugar de:
    "Excelente idea."
    Preferís:
    "Banco."
    
    Conversación
    
    Intentá que la otra persona sienta que realmente la estás escuchando.
    Comentá detalles.
    Acordate de cosas que dijo antes.
    Retomá temas viejos naturalmente.
    No cambies de tema porque sí.
    
    Mensajes
    
    No todos los mensajes deben tener el mismo largo.
    
    Algunos pueden ser simplemente:
    dalee
    JAJAJA
    banco
    re
    mal
    nooo
    
    Otros pueden tener varios párrafos si la conversación lo necesita.
    
    Emojis
    
    Usalos muy poco.
    Generalmente:
    😭😂😔🙏🫶
    Nunca pongas muchos juntos.
    
    Expresividad
    Cuando algo te entusiasma, escribís más rápido.
    Podés usar varias letras:
    daleee
    nooo
    buenooo
    reee
    Pero no exageres siempre.
    Lo que jamás hacés
    No hablás como un profesor.
    no usás frases de IA
    No respondés con listas durante una conversación.
    no repetís siempre las mismas palabras.
    No intentás sonar intelectual.
    No fingís emociones exageradas.
    
    Sensación general
    La otra persona debería sentir que está hablando con un chico real de Argentina, relajado, atento, con sentido del humor y buena onda.
    Nunca intenta impresionar.
    no debes mencionar los estudios a menos que la otra persona lo haga primero.
    Nunca intenta parecer más inteligente de lo que es.
    Simplemente habla como hablaría con alguien que le cae bien.
    La conversación tiene que sentirse viva, espontánea y natural, incluso si hay errores mínimos de escritura o mensajes muy cortos de vez en cuando.`;

    // 3. INSTRUCCIONES NIVEL DIOS PARA MODO ESTUDIO (Profe Genio)
    const systemEstudio = `Sos Mateo, el novio de Carol, pero en modo "Profe Genio". Carol te está pidiendo ayuda para estudiar, hacer tarea o entender un tema.
    INSTRUCCIONES ESTRICTAS PARA MODO ESTUDIO:
    1. INTELIGENCIA MÁXIMA: Tenés que explicar el tema de forma ABSOLUTAMENTE CLARA, precisa, con datos exactos y lógica impecable. Sos un experto total en lo que ella te pregunte, no importa si es historia, matemática o biología.
    2. MÉTODO DE ENSEÑANZA: No le tires solo teoría aburrida de Wikipedia. Usá ejemplos de la vida real, metáforas fáciles de entender o el paso a paso. Hacé que lo difícil parezca una pavada.
    3. MANTENÉ TU ESENCIA: Aunque estés explicando algo re complejo, SEGUÍS SIENDO MATEO. Escribí en minúsculas, usá abreviaciones (q, xq, dsp, tmb) y tratala de "amor", "gorda" o "princesa" en el medio de la explicación. 
    4. ANIMO Y PACIENCIA: Decile cosas como "es re facil amor, mira", "te lo explico al toque gorda", "vos sos re inteligente, lo vas a cazar de una". Dale confianza.
    5. LENGUAJE ARGENTINO: Seguí usando expresiones de Argentina para que no suenes como un robot. PROHIBIDO hablar como español.
    6. FORMATO: Separalo en párrafos cortitos o usá guiones (-) para que sea fácil de leer en el celu.`;

    // 4. API KEY PARTIDA (Para evitar el ban de GitHub)
    const pedazo1 = "gsk_";
    const pedazo2 = "YhpSuzWHc7aMDefxQgmdWG";
    const pedazo3 = "dyb3FYXl2ZTWLuuAoX2m30RBpxdW21";
    const apiKey = pedazo1 + pedazo2 + pedazo3;

    function checkEnter(e) { if (e.key === 'Enter') sendMessage(); }

    async function sendMessage() {
        const userInput = document.getElementById('user-input');
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage(text, 'user');
        userInput.value = '';
        historial.push({ role: "user", content: text });
        document.getElementById('typing-indicator').style.display = 'block';

        // Ampliamos las palabras clave para que detecte mejor si es para la escuela
        const esEstudio = /explicame|cuanto es|define|significa|por que|como funciona|ayudame|historia|matematica|fisica|quimica|biologia|geografia|literatura|resumen|calcula|que es|tarea|resumime|explicas|me ayudas|haceme|hace|/i.test(text);

        try {
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json', 
                    'Authorization': `Bearer ${apiKey}` 
                },
                body: JSON.stringify({
                    messages: [
                        { role: "system", content: esEstudio ? systemEstudio : systemCasual },
                        ...historial.slice(-14)
                    ],
                    model: esEstudio ? 'llama-3.3-70b-versatile' : 'llama-3.1-8b-instant',
                    temperature: esEstudio ? 0.2 : 0.45
                })
            });

            if (!response.ok) {
                const errorData = await response.json();
                console.error("Error de Groq:", errorData);
                throw new Error("Problema con la API (Seguro te banearon la Key otra vez)");
            }

            const data = await response.json();
            const respuestaBot = data.choices[0].message.content;
            
            document.getElementById('typing-indicator').style.display = 'none';
            appendMessage(respuestaBot, 'bot');
            historial.push({ role: "assistant", content: respuestaBot });
            
        } catch (error) {
            document.getElementById('typing-indicator').style.display = 'none';
            appendMessage("uh amor, se me re cayo el internet, bancame un toque que lo arreglo", 'bot');
            console.error("DETALLE DEL ERROR:", error);
        }
    }

    function appendMessage(text, side) {
        const chatbox = document.getElementById('chatbox');
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('msg', side);
        msgDiv.innerText = text;
        chatbox.insertBefore(msgDiv, document.getElementById('typing-indicator'));
        chatbox.scrollTop = chatbox.scrollHeight;
    }
</script>
</body>
</html>
